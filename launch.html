<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>啟動血脂管理決策系統</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.6.0/build/fhir-client.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09d;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>正在透過醫學中心 EHR 安全認證中...</p>
    </div>

    <script>
        /**
         * SMART on FHIR 啟動配置（已依照第二階段測試 PDF 調整）
         * 使用官方提供的 client_id 與 client_secret
         */
        FHIR.oauth2.authorize({
            clientId: "cc344727-6f90-496c-94fd-c7829aa9a51d",
            clientSecret: "79f04b56b33491716c0880af72cdef7d3f0629111421cedd18353651cd313d9e",
            scope: "launch openid fhirUser patient/*.read",
            redirectUri: "index.html",
            pkceMode: "unsafe-fallback"   // 相容舊版 EMR 環境
        });
    </script>
</body>
</html>
