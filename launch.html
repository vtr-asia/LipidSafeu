<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>啟動血脂管理決策系統</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.6.0/build/fhir-client.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09d;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>正在透過醫學中心 EHR 安全認證中...</p>
    </div>

    <script>
        /**
         * 修正後的 SMART on FHIR 啟動配置（推薦正式環境寫法）
         * - 移除 clientSecret（前端不應持有）
         * - 使用完整 PKCE（不再 unsafe-fallback）
         * - 適合純前端 Public Client
         */
        FHIR.oauth2.authorize({
            clientId: "cc344727-6f90-496c-94fd-c7829aa9a51d",
            // clientSecret 已移除 → 前端不再暴露機密金鑰
            scope: "launch openid fhirUser patient/*.read",
            redirectUri: "index.html",
            
            // 強制使用 PKCE S256（最安全，現代 EHR 幾乎都支援）
            pkceMode: "ifSupported",        // 或直接省略，fhirclient 預設會盡量使用 PKCE
            
            // 可選：明確指定 PKCE method（fhirclient v2.6+ 支援）
            // codeChallengeMethod: "S256"
        });
    </script>
</body>
</html>
