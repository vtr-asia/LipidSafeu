<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>2025 血脂管理決策系統 - 測試優化版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.6.0/build/fhir-client.js"></script>
    <style>
        .risk-tag { width: 110px; text-align: center; }
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .detail-section { margin-bottom: 1.5rem; }
        #ldl-chart { max-height: 250px; margin-top: 1rem; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; border: 1px solid #dee2e6; }
    </style>
</head>
<body class="bg-light">

<div id="loading-overlay">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-3 fw-bold">正在讀取 FHIR Server 病患資料...</div>
</div>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-sm p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 id="det-name" class="text-primary fw-bold">讀取中...</h2>
                    <span id="risk-badge" class="badge risk-tag p-2">計算中</span>
                </div>
                <hr>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="detail-section">
                            <h6><span class="badge bg-secondary mb-2">臨床診斷 (Conditions)</span></h6>
                            <p id="det-cond" class="small text-muted">正在檢索診斷紀錄...</p>
                        </div>
                        
                        <div class="detail-section">
                            <h6><span class="badge bg-primary mb-2">LDL-C 指標</span></h6>
                            <div class="h3 mb-2">
                                目前: <span id="det-ldl" class="text-danger fw-bold">--</span> <small>mg/dL</small>
                            </div>
                            <div class="text-muted mb-3">目標值: <span id="det-target">--</span> mg/dL</div>
                            
                            <div class="small mb-1 d-flex justify-content-between">
                                <span>治療達成率</span>
                                <span id="progress-text">0%</span>
                            </div>
                            <div class="progress" style="height: 15px;">
                                <div id="progress-bar" class="progress-bar" role="progressbar" style="width: 0%;"></div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6 border-start">
                        <h6><span class="badge bg-info mb-2">LDL-C 差距分析</span></h6>
                        <canvas id="ldl-chart"></canvas>
                    </div>
                </div>

                <div class="mt-4">
                    <div class="alert alert-warning">
                        <strong class="d-block mb-2">📌 2025 專家共識建議：</strong>
                        <div id="det-advice" class="small" style="white-space: pre-wrap;">正在根據臨床指標生成建議...</div>
                    </div>
                </div>
                
                <div class="text-end text-muted mt-2" style="font-size: 0.75rem;">
                    Data Source: <span id="server-url"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let chartInstance = null;

    // 1. 初始化 SMART App
    FHIR.oauth2.ready()
        .then(client => {
            document.getElementById('server-url').innerText = client.state.serverUrl;
            return Promise.all([
                client.patient.read(),
                client.request(`/Condition?patient=${client.patient.id}`),
                client.request(`/Observation?patient=${client.patient.id}&code=13457-7,2085-9,8480-6,8462-4&_sort=-date`)
            ]);
        })
        .then(([patient, condBundle, obsBundle]) => {
            const conditions = condBundle.entry ? condBundle.entry.map(e => e.resource) : [];
            const observations = obsBundle.entry ? obsBundle.entry.map(e => e.resource) : [];
            
            renderDashboard(patient, conditions, observations);
            document.getElementById('loading-overlay').style.display = 'none';
        })
        .catch(err => {
            console.error("FHIR Data Error:", err);
            document.getElementById('det-name').innerText = "連線失敗";
            document.getElementById('loading-overlay').innerHTML = `<div class="text-danger p-4">連線錯誤: ${err.message}<br>請確認是否經由正確的 Launch 流程進入。</div>`;
        });

    // 2. 風險與建議邏輯 (保留並優化您的核心演算法)
    function calculateLipidGuideline(patient, conditions, observations) {
        // 取得最新 LDL (LOINC: 13457-7)
        const ldlObs = observations.find(o => o.code.coding.some(c => c.code === '13457-7'));
        const ldlValue = ldlObs ? parseFloat(ldlObs.valueQuantity.value) : null;

        // 簡易診斷比對
        const hasCond = (keywords) => conditions.some(c => 
            keywords.some(k => (c.code.text || "").toLowerCase().includes(k.toLowerCase()))
        );

        let risk = "一般風險";
        let target = 130;
        let color = "success";
        let advice = "建議維持健康生活型態。";

        // 2025 指引邏輯判定
        if (hasCond(['MI', 'Stroke', '狹窄', 'CAD', 'ACS'])) {
            risk = "非常高風險";
            target = 70;
            color = "danger";
            advice = "1. 強烈建議起始高強度 Statin。\n2. 若 6 週後未達標 (<70)，應考慮合併 Ezetimibe。";
        } else if (hasCond(['Diabetes', 'DM', 'CKD'])) {
            risk = "高風險";
            target = 100;
            color = "warning";
            advice = "1. 建議起始中強度 Statin。\n2. 控制血糖與血壓，每 6 個月追蹤 LDL。";
        }

        return { risk, target, color, advice, ldlValue };
    }

    // 3. 渲染畫面
    function renderDashboard(patient, conditions, observations) {
        const { risk, target, color, advice, ldlValue } = calculateLipidGuideline(patient, conditions, observations);
        
        // 更新文字
        const name = patient.name ? patient.name[0].text : "匿名病患";
        document.getElementById('det-name').innerText = name;
        document.getElementById('det-cond').innerText = conditions.map(c => c.code.text).join(', ') || '查無診斷紀錄';
        document.getElementById('det-ldl').innerText = ldlValue || 'N/A';
        document.getElementById('det-target').innerText = target;
        document.getElementById('det-advice').innerText = advice;
        
        // 更新 Badge
        const badge = document.getElementById('risk-badge');
        badge.innerText = risk;
        badge.className = `badge risk-tag p-2 bg-${color}`;

        // 更新進度條
        if (ldlValue) {
            const progress = Math.min(Math.round((target / ldlValue) * 100), 100);
            const pb = document.getElementById('progress-bar');
            pb.style.width = progress + '%';
            pb.className = `progress-bar bg-${ldlValue > target ? 'danger' : 'success'}`;
            document.getElementById('progress-text').innerText = ldlValue > target ? `距離目標尚差 ${ldlValue - target} mg/dL` : '已達標';
        }

        // 繪製圖表
        const ctx = document.getElementById('ldl-chart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['目前數值', '指引目標'],
                datasets: [{
                    label: 'LDL-C (mg/dL)',
                    data: [ldlValue || 0, target],
                    backgroundColor: [ldlValue > target ? '#dc3545' : '#198754', '#0d6efd']
                }]
            },
            options: { responsive: true, scales: { y: { beginAtZero: true } } }
        });
    }
</script>

</body>
</html>
